<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nfk</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Nunito', sans-serif;
      background: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .top {
      margin-bottom: 2rem;
    }
    
    .top img {
      width: 396px;
      height: auto;
      display: block;
    }
    
    .middle {
      width: 72.3%;
      max-width: 432px;
    }
    
    .upload-area {
      border: 2px dashed #444;
      padding: 3rem;
      text-align: center;
      cursor: pointer;
      background: #d0d0d0; /* Dark gray */
      border-radius: 4px;
      transition: background 0.2s ease;
      user-select: none;
    }
    
    .upload-area:hover {
      background: #c0c0c0;
    }
    
    input[type="file"] {
      display: none;
    }

    #status {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #555;
      text-align: center;
      height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="top">
    <img src="https://cdn.jsdelivr.net/gh/TheAlphaLeopard/newfloosh@latest/logo.png" alt=" NEW floosh & knuckles">
  </div>
  <div class="middle">
    <div class="upload-area" id="uploadArea">
      <p>Drop a folder/zip here</p>
    </div>
    <input type="file" id="folderInput" webkitdirectory directory multiple>
    <div id="status"></div>
  </div>

  <script type="module">
    // Comprehensive MimeType map
    function getMimeType(path) {
      let lowerPath = path.toLowerCase();
      
      // Handle multi-part files (e.g., game.wasm.part1 -> game.wasm)
      const partMatch = lowerPath.match(/(.*)\.part\d+$/);
      if (partMatch) {
        lowerPath = partMatch[1];
      }

      const extMap = {
        'html': 'text/html', 'htm': 'text/html', 'css': 'text/css', 'txt': 'text/plain',
        'js': 'application/javascript', 'mjs': 'application/javascript',
        'json': 'application/json', 'wasm': 'application/wasm',
        'png': 'image/png', 'jpg': 'image/jpeg', 'jpeg': 'image/jpeg', 'gif': 'image/gif', 
        'svg': 'image/svg+xml', 'webp': 'image/webp', 'ico': 'image/x-icon',
        'mp3': 'audio/mpeg', 'wav': 'audio/wav', 'ogg': 'audio/ogg', 'm4a': 'audio/mp4',
        'mp4': 'video/mp4', 'webm': 'video/webm', 'ogv': 'video/ogg',
        'ttf': 'font/ttf', 'woff': 'font/woff', 'woff2': 'font/woff2', 'otf': 'font/otf',
        'pck': 'application/octet-stream', 'unityweb': 'application/octet-stream', 
        'bin': 'application/octet-stream', 'data': 'application/octet-stream',
        'love': 'application/octet-stream'
      };

      if (lowerPath.endsWith('.wasm.code.unityweb')) return 'application/wasm';
      if (lowerPath.endsWith('.wasm.framework.unityweb')) return 'application/wasm';
      
      const ext = lowerPath.split('.').pop() || '';
      return extMap[ext] || 'application/octet-stream';
    }

    const uploadArea = document.getElementById('uploadArea');
    const folderInput = document.getElementById('folderInput');
    const status = document.getElementById('status');

    uploadArea.addEventListener('click', () => folderInput.click());

    folderInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files).map(file => ({
        path: file.webkitRelativePath || file.name,
        file: file
      }));
      if (files.length > 0) processFiles(files);
    });

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.background = '#bbb';
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.background = '#d0d0d0';
    });

    uploadArea.addEventListener('drop', async (e) => {
      e.preventDefault();
      uploadArea.style.background = '#d0d0d0';
      const items = Array.from(e.dataTransfer.items);
      const files = [];
      
      status.textContent = "Scanning folder...";
      
      for (const item of items) {
        if (item.kind === 'file') {
          const entry = item.webkitGetAsEntry?.();
          if (entry) {
            await traverseDirectory(entry, '', files);
          } else {
            const file = item.getAsFile();
            if (file) files.push({ path: file.name, file });
          }
        }
      }
      if (files.length > 0) processFiles(files);
    });

    async function traverseDirectory(entry, path, files) {
      if (entry.isFile) {
        const file = await new Promise((resolve) => entry.file(resolve));
        files.push({ path: path + entry.name, file });
      } else if (entry.isDirectory) {
        const reader = entry.createReader();
        const entries = await new Promise((resolve) => {
          let results = [];
          const read = () => {
            reader.readEntries((batch) => {
              if (batch.length) {
                results.push(...batch);
                read();
              } else resolve(results);
            });
          };
          read();
        });
        for (const e of entries) {
          await traverseDirectory(e, path + entry.name + '/', files);
        }
      }
    }

    async function processFiles(fileList) {
      status.textContent = "Processing assets...";
      
      const validFiles = fileList.filter(f => !f.path.includes('__MACOSX') && !f.path.endsWith('.DS_Store'));

      const directory = {};
      const blobsToConcat = [];
      let currentOffset = 0;

      // Create a single archive of all files and map memory pointers (offsets)
      for (const { path, file } of validFiles) {
        const type = getMimeType(path);
        const normalizedPath = path.replace(/\\/g, '/').replace(/^\/+/, '');
        
        directory[normalizedPath] = {
          offset: currentOffset,
          size: file.size,
          type: type
        };
        
        blobsToConcat.push(file);
        currentOffset += file.size;
      }

      const archiveBlob = new Blob(blobsToConcat);

      const entryFile = validFiles.find(f => f.path.toLowerCase().endsWith('index.html')) ||
                        validFiles.find(f => f.path.toLowerCase().endsWith('.html'));

      if (!entryFile) {
        alert('No HTML entry file found in the selection.');
        status.textContent = "";
        return;
      }

      const normalizedEntry = entryFile.path.replace(/\\/g, '/').replace(/^\/+/, '');
      const entryMeta = directory[normalizedEntry];
      const entryBlob = archiveBlob.slice(entryMeta.offset, entryMeta.offset + entryMeta.size, entryMeta.type);
      
      let html = await entryBlob.text();
      const baseDir = normalizedEntry.includes('/') ? normalizedEntry.substring(0, normalizedEntry.lastIndexOf('/') + 1) : '';
      
      // Store VFS securely on window. document.open() retains the global scope.
      window.__VFS__ = {
        blob: archiveBlob,
        dir: directory,
        baseDir: baseDir,
        urlCache: {}
      };

      window.__VFS_RESOLVE__ = function(url) {
        if (!url || typeof url !== 'string' || url.startsWith('blob:') || url.startsWith('data:')) return url;
        try {
          const u = new URL(url, "http://vfs.local/");
          if (u.hostname !== 'vfs.local' && u.hostname !== window.location.hostname) return url;

          let path = decodeURIComponent(u.pathname);
          if (path.startsWith('/')) path = path.substring(1);
          
          const vfs = window.__VFS__;
          let match = vfs.dir[path] || vfs.dir[vfs.baseDir + path] || 
                      vfs.dir[path + '.part1'] || vfs.dir[vfs.baseDir + path + '.part1'];
          
          if (!match) {
            const filename = path.split('/').pop();
            for (let key in vfs.dir) {
              if (key.endsWith('/' + filename) || key === filename || 
                  key.endsWith('/' + filename + '.part1') || key === filename + '.part1') {
                match = vfs.dir[key];
                break;
              }
            }
          }

          if (match) {
            const cacheKey = match.offset + '_' + match.size;
            if (vfs.urlCache[cacheKey]) return vfs.urlCache[cacheKey];
            const slice = vfs.blob.slice(match.offset, match.offset + match.size, match.type);
            const blobUrl = URL.createObjectURL(slice);
            vfs.urlCache[cacheKey] = blobUrl;
            return blobUrl;
          }
        } catch(e) {}
        return url;
      };

      // Pre-parse HTML using DOMParser. This catches <script src="..."> tags before they
      // ever hit the browser engine, preventing premature network 404 requests.
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      doc.querySelectorAll('[src], [href], [data]').forEach(el => {
        ['src', 'href', 'data'].forEach(attr => {
          if (el.hasAttribute(attr)) {
            el.setAttribute(attr, window.__VFS_RESOLVE__(el.getAttribute(attr)));
          }
        });
      });
      html = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
      
      const interceptor = `
        <script>
          (function() {
            const resolve = window.__VFS_RESOLVE__;

            const nativeFetch = window.fetch;
            window.fetch = function(input, init) {
              const url = (typeof input === 'string') ? input : (input instanceof Request ? input.url : input);
              const resolved = resolve(url);
              return nativeFetch(resolved, init);
            };

            const nativeXHR = window.XMLHttpRequest;
            window.XMLHttpRequest = function() {
              const xhr = new nativeXHR();
              const nativeOpen = xhr.open;
              xhr.open = function(method, url, ...args) {
                return nativeOpen.call(this, method, resolve(url), ...args);
              };
              return xhr;
            };

            const patchEl = (el) => {
              if (el.nodeType !== 1) return;
              ['src', 'href', 'data'].forEach(attr => {
                if (el.hasAttribute(attr)) {
                  const original = el.getAttribute(attr);
                  const resolved = resolve(original);
                  if (resolved !== original) el.setAttribute(attr, resolved);
                }
              });
            };

            const orgSetAttribute = Element.prototype.setAttribute;
            Element.prototype.setAttribute = function(name, value) {
              if (['src', 'href', 'data'].includes(name.toLowerCase())) {
                value = resolve(value);
              }
              return orgSetAttribute.call(this, name, value);
            };

            const patchProp = (proto, prop) => {
              const descriptor = Object.getOwnPropertyDescriptor(proto, prop);
              if (!descriptor) return;
              Object.defineProperty(proto, prop, {
                set: function(val) { descriptor.set.call(this, resolve(val)); },
                get: function() { return descriptor.get.call(this); },
                configurable: true
              });
            };
            
            [HTMLImageElement, HTMLScriptElement, HTMLLinkElement, HTMLSourceElement, HTMLVideoElement, HTMLAudioElement, HTMLIFrameElement, HTMLObjectElement].forEach(cls => {
              if (cls && cls.prototype) {
                if (cls.prototype.hasOwnProperty('src')) patchProp(cls.prototype, 'src');
                if (cls.prototype.hasOwnProperty('href')) patchProp(cls.prototype, 'href');
                if (cls.prototype.hasOwnProperty('data')) patchProp(cls.prototype, 'data');
              }
            });

            if (window.Worker) {
              const nativeWorker = window.Worker;
              window.Worker = function(scriptURL, options) {
                return new nativeWorker(resolve(scriptURL), options);
              };
            }

            const nativeWrite = document.write;
            const nativeWriteln = document.writeln;
            const patchString = (str) => {
              if (typeof str !== 'string') return str;
              return str.replace(/(src|href|data)="([^"]+)"/gi, (m, p1, p2) => \`\${p1}="\${resolve(p2)}"\`);
            };
            document.write = function(...args) { return nativeWrite.apply(document, args.map(patchString)); };
            document.writeln = function(...args) { return nativeWriteln.apply(document, args.map(patchString)); };

            const observer = new MutationObserver((mutations) => {
              mutations.forEach(m => {
                m.addedNodes.forEach(node => {
                  patchEl(node);
                  if (node.querySelectorAll) node.querySelectorAll('[src], [href], [data]').forEach(patchEl);
                });
              });
            });
            observer.observe(document.documentElement, { childList: true, subtree: true });

            console.log("floosh64: High-performance pointer-based VFS active. Memory safe mode.");
          })();
        <\/script>
      `;

      const headIdx = html.toLowerCase().indexOf('<head>');
      if (headIdx !== -1) {
        html = html.slice(0, headIdx + 6) + interceptor + html.slice(headIdx + 6);
      } else {
        html = interceptor + html;
      }

      document.open();
      document.write(html);
      document.close();
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet">
</body>
</html>
