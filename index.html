<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>floosh64</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Nunito', sans-serif;
      background: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .top {
      margin-bottom: 2rem;
    }
    
    .top img {
      width: 396px; /* 345 * 1.15 */
      height: auto;
    }
    
    .middle {
      width: 77.8%; /* 83.7 * 0.93 */
      max-width: 432px;
    }
    
    .upload-area {
      border: 2px dashed #444;
      padding: 3rem;
      text-align: center;
      cursor: pointer;
      background: #dcdcdc;
      border-radius: 4px;
      transition: background 0.2s ease;
    }
    
    .upload-area:hover {
      background: #d4d4d4;
    }
    
    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>
  <div class="top">
    <img src="/logo.png" alt="floosh64">
  </div>
  <div class="middle">
    <div class="upload-area" id="uploadArea">
      <p>Drop a folder/zip here</p>
    </div>
  </div>

  <script type="module">
    import JSZip from 'https://esm.sh/jszip@3.10.1';
    import { getMimeType } from './flooshmime.js';

    const uploadArea = document.getElementById('uploadArea');

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.background = '#ccc';
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.background = '#dcdcdc';
    });

    uploadArea.addEventListener('drop', async (e) => {
      e.preventDefault();
      uploadArea.style.background = '#dcdcdc';
      
      const items = Array.from(e.dataTransfer.items);
      const fileEntries = [];

      for (const item of items) {
        if (item.kind === 'file') {
          const entry = item.webkitGetAsEntry?.();
          if (entry) {
            fileEntries.push(entry);
          } else {
            const file = item.getAsFile();
            if (file) {
              if (file.name.toLowerCase().endsWith('.zip')) {
                await processZip(file);
                return;
              }
              processFiles([{ path: file.name, file }]);
            }
          }
        }
      }

      if (fileEntries.length > 0) {
        const files = [];
        for (const entry of fileEntries) {
          if (entry.isFile && entry.name.toLowerCase().endsWith('.zip')) {
             const file = await new Promise(r => entry.file(r));
             await processZip(file);
             return;
          }
          await traverseDirectory(entry, '', files);
        }
        processFiles(files);
      }
    });

    async function processZip(zipFile) {
      const zip = await JSZip.loadAsync(zipFile);
      const files = [];
      const promises = [];
      
      zip.forEach((relativePath, zipEntry) => {
        if (!zipEntry.dir) {
          promises.push(zipEntry.async('blob').then(blob => {
            files.push({ path: relativePath, file: blob });
          }));
        }
      });
      
      await Promise.all(promises);
      processFiles(files);
    }

    async function traverseDirectory(entry, path, files) {
      if (entry.isFile) {
        const file = await new Promise((resolve) => entry.file(resolve));
        files.push({ path: path + entry.name, file });
      } else if (entry.isDirectory) {
        const reader = entry.createReader();
        const entries = await new Promise((resolve) => {
          const allEntries = [];
          const read = () => {
            reader.readEntries((results) => {
              if (results.length) {
                allEntries.push(...results);
                read();
              } else {
                resolve(allEntries);
              }
            });
          };
          read();
        });
        for (const e of entries) {
          await traverseDirectory(e, path + entry.name + '/', files);
        }
      }
    }

    async function processFiles(fileList) {
      const blobMap = {};
      
      for (const { path, file } of fileList) {
        const type = getMimeType(path);
        const blob = new Blob([file], { type });
        blobMap[path] = URL.createObjectURL(blob);
      }

      let entryPath = fileList.find(f => f.path.endsWith('index.html'))?.path ||
                      fileList.find(f => f.path.endsWith('.html'))?.path;

      if (!entryPath) {
        alert('No HTML file found in the dropped content.');
        return;
      }

      const response = await fetch(blobMap[entryPath]);
      let html = await response.text();
      
      const baseDir = entryPath.includes('/') ? entryPath.substring(0, entryPath.lastIndexOf('/') + 1) : '';
      
      // The interceptor script handles dynamic loading (fetch, XHR)
      const interceptor = `
        <script>
          (function() {
            const blobMap = ${JSON.stringify(blobMap)};
            const baseDir = "${baseDir}";
            
            function resolve(url) {
              try {
                const urlObj = new URL(url, window.location.href);
                if (urlObj.origin !== window.location.origin) return url;
                let path = urlObj.pathname;
                if (path.startsWith('/')) path = path.substring(1);
                
                // Try resolving relative to baseDir if needed
                const pathsToTry = [path];
                if (baseDir && !path.startsWith(baseDir)) {
                   pathsToTry.unshift(baseDir + path);
                }

                for (const p of pathsToTry) {
                  const cleanPath = p.split('?')[0].split('#')[0];
                  if (blobMap[cleanPath]) return blobMap[cleanPath];
                  // Handle cases where the path might have leading slashes in map
                  if (blobMap['/' + cleanPath]) return blobMap['/' + cleanPath];
                }
              } catch(e) {}
              return url;
            }

            const nativeFetch = window.fetch;
            window.fetch = function(input, init) {
              if (typeof input === 'string') {
                input = resolve(input);
              } else if (input instanceof Request) {
                input = new Request(resolve(input.url), input);
              }
              return nativeFetch(input, init);
            };

            const nativeXHR = window.XMLHttpRequest;
            window.XMLHttpRequest = function() {
              const xhr = new nativeXHR();
              const nativeOpen = xhr.open;
              xhr.open = function(method, url, ...args) {
                return nativeOpen.call(this, method, resolve(url), ...args);
              };
              return xhr;
            };

            // Patch dynamic imports / module scripts if possible via base tag
            const base = document.createElement('base');
            base.href = window.location.href;
            document.head.appendChild(base);
          })();
        <\/script>
      `;

      // Rewrite static URLs in the HTML
      html = rewriteUrls(html, baseDir, blobMap);
      
      // Inject interceptor at the start of head
      if (html.includes('<head>')) {
        html = html.replace('<head>', '<head>' + interceptor);
      } else {
        html = interceptor + html;
      }

      const newWindow = window.open('about:blank');
      if (newWindow) {
        newWindow.document.open();
        newWindow.document.write(html);
        newWindow.document.close();
      } else {
        alert("Pop-up blocked! Please allow pop-ups to view the content.");
      }
    }

    function rewriteUrls(content, baseDir, blobMap) {
      // Regex for src, href, and url()
      return content.replace(/(src|href)=["']([^"']+)["']|url\(["']?([^"')]+)["']?\)/gi, (match, attr, url, cssUrl) => {
        const targetUrl = url || cssUrl;
        if (!targetUrl || targetUrl.startsWith('http') || targetUrl.startsWith('data:') || targetUrl.startsWith('blob:')) {
          return match;
        }

        const resolvedPath = resolvePath(baseDir, targetUrl);
        const blobUrl = blobMap[resolvedPath];
        
        if (blobUrl) {
          if (attr) return `${attr}="${blobUrl}"`;
          return `url("${blobUrl}")`;
        }
        return match;
      });
    }

    function resolvePath(base, relative) {
      if (relative.startsWith('/')) return relative.substring(1);
      const stack = base.split('/').filter(Boolean);
      const parts = relative.split('/');
      for (const part of parts) {
        if (part === '.') continue;
        if (part === '..') stack.pop();
        else stack.push(part);
      }
      return stack.join('/');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet">
</body>
</html>
